server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # DNS resolver for dynamic proxy_pass (Google DNS)
    resolver 8.8.8.8 8.8.4.4 valid=30s ipv6=off;
    resolver_timeout 5s;

    # Redirect non-www to www (prisincera.com → www.prisincera.com)
    if ($host = 'prisincera.com') {
        return 301 https://www.prisincera.com$request_uri;
    }

    # gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    # PriSignal — Buttondown API proxy (API key injected via envsubst at runtime)
    location /api/subscribe {
        proxy_pass https://api.buttondown.email/v1/subscribers;
        proxy_set_header Authorization "Token $BUTTONDOWN_API_KEY";
        proxy_set_header Content-Type "application/json";
        proxy_ssl_server_name on;
    }

    location /api/archive {
        proxy_pass https://api.buttondown.email/v1/emails;
        proxy_set_header Authorization "Token $BUTTONDOWN_API_KEY";
        proxy_ssl_server_name on;
    }

    location ~ ^/api/archive/(.+)$ {
        proxy_pass https://api.buttondown.email/v1/emails/$1;
        proxy_set_header Authorization "Token $BUTTONDOWN_API_KEY";
        proxy_ssl_server_name on;
    }

    # PriSignal — Daily Signal JSON proxy (GCS public)
    location ~ ^/api/daily/([0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9])$ {
        set $daily_date $1;
        proxy_pass https://storage.googleapis.com/prisincera-prisignal-data/daily/$daily_date.json;
        proxy_ssl_server_name on;
        proxy_set_header Host storage.googleapis.com;
        proxy_hide_header x-goog-hash;
        proxy_hide_header x-goog-generation;
        proxy_hide_header x-goog-storage-class;
        add_header Cache-Control "public, max-age=300";
        add_header Access-Control-Allow-Origin "*";
    }

    # PriSignal — Daily Signal index (최근 목록)
    location = /api/daily/index {
        proxy_pass https://storage.googleapis.com/prisincera-prisignal-data/daily/index.json;
        proxy_ssl_server_name on;
        proxy_set_header Host storage.googleapis.com;
        proxy_hide_header x-goog-hash;
        proxy_hide_header x-goog-generation;
        proxy_hide_header x-goog-storage-class;
        add_header Cache-Control "public, max-age=300";
        add_header Access-Control-Allow-Origin "*";
    }

    # SPA fallback (replaces Firebase rewrites ** → /index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache: JS/CSS with content hash (immutable, mirrors Firebase config)
    location ~* \.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Cache: Audio files (BGM etc.)
    location /audio/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000";
    }

    # Cache: Images
    location ~* \.(png|jpg|jpeg|gif|svg|webp|ico)$ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # Security headers (replaces Firebase headers)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
