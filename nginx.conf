server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Redirect non-www to www (prisincera.com → www.prisincera.com)
    if ($host = 'prisincera.com') {
        return 301 https://www.prisincera.com$request_uri;
    }

    # gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    # PriSignal — Buttondown API proxy (activate after Buttondown setup)
    # Requires: envsubst in Dockerfile CMD + BUTTONDOWN_API_KEY env var in Cloud Run
    #
    # location /api/subscribe {
    #     proxy_pass https://api.buttondown.email/v1/subscribers;
    #     proxy_set_header Authorization "Token $BUTTONDOWN_API_KEY";
    #     proxy_set_header Content-Type "application/json";
    #     proxy_ssl_server_name on;
    # }
    #
    # location /api/archive {
    #     proxy_pass https://api.buttondown.email/v1/emails;
    #     proxy_set_header Authorization "Token $BUTTONDOWN_API_KEY";
    #     proxy_ssl_server_name on;
    # }

    # SPA fallback (replaces Firebase rewrites ** → /index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache: JS/CSS with content hash (immutable, mirrors Firebase config)
    location ~* \.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Cache: Audio files (BGM etc.)
    location /audio/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000";
    }

    # Cache: Images
    location ~* \.(png|jpg|jpeg|gif|svg|webp|ico)$ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # Security headers (replaces Firebase headers)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
