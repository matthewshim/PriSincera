<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <meta name="supported-color-schemes" content="light dark">
  <!--
    ═══════════════════════════════════════════════════════════
    PriSignal — Buttondown Email Template v2
    ═══════════════════════════════════════════════════════════
    Buttondown 관리자 > Settings > Design > Custom Template에 붙여넣기.
    
    Buttondown 변수:
    - {{ subject }}         — 이메일 제목
    - {{ body }}            — 본문 HTML (Markdown 변환)
    - {{ unsubscribe_url }} — 구독 해지 링크
    - {{ email_url }}       — 웹에서 보기 링크
    ═══════════════════════════════════════════════════════════
  -->
  <style>
    /* Reset */
    body, table, td, p, a, li, blockquote { 
      -webkit-text-size-adjust: 100%; 
      -ms-text-size-adjust: 100%; 
    }
    table, td { 
      mso-table-lspace: 0pt; 
      mso-table-rspace: 0pt; 
    }
    img { 
      -ms-interpolation-mode: bicubic; 
      border: 0; outline: none; text-decoration: none; 
    }
    body { 
      margin: 0; padding: 0; 
      width: 100% !important; height: 100% !important; 
    }

    /* ── Typography for Markdown body ── */
    h1 {
      font-family: 'Outfit', 'Noto Sans KR', -apple-system, sans-serif;
      font-size: 22px; font-weight: 700; color: #F5F3FF;
      margin: 0 0 8px; line-height: 1.3;
    }
    h2 {
      font-family: 'Outfit', 'Noto Sans KR', -apple-system, sans-serif;
      font-size: 17px; font-weight: 700; color: #C084FC;
      margin: 28px 0 12px; line-height: 1.3;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(196,181,253,0.12);
    }
    h3 {
      font-family: 'Noto Sans KR', -apple-system, sans-serif;
      font-size: 15px; font-weight: 700; color: #F5F3FF;
      margin: 20px 0 6px; line-height: 1.4;
    }
    p {
      font-family: 'Noto Sans KR', -apple-system, sans-serif;
      font-size: 14px; color: #E9D5FF; line-height: 1.75;
      margin: 0 0 12px;
    }
    a {
      color: #C084FC;
      text-decoration: underline;
      text-decoration-color: rgba(192,132,252,0.3);
      text-underline-offset: 2px;
    }
    a:hover { text-decoration-color: #C084FC; }
    strong { color: #F5F3FF; font-weight: 600; }
    em { color: #A78BFA; font-style: italic; }
    ul, ol {
      font-family: 'Noto Sans KR', -apple-system, sans-serif;
      font-size: 14px; color: #E9D5FF; line-height: 1.75;
      margin: 0 0 16px; padding-left: 20px;
    }
    li { margin-bottom: 6px; }
    hr {
      border: none; height: 1px; margin: 24px 0;
      background: linear-gradient(90deg, transparent, rgba(196,181,253,0.15), transparent);
    }
    blockquote {
      margin: 16px 0;
      padding: 12px 16px;
      border-left: 3px solid #7C3AED;
      background: rgba(124,58,237,0.06);
      border-radius: 0 8px 8px 0;
    }
    blockquote p { color: #A78BFA; margin: 0; font-style: italic; }
    code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px; color: #22D3EE;
      background: rgba(34,211,238,0.08);
      padding: 2px 6px; border-radius: 4px;
    }

    /* ── Dark Mode Override (for clients that force light) ── */
    @media (prefers-color-scheme: light) {
      .email-body-outer { background-color: #0A0714 !important; }
      .email-container { background-color: transparent !important; }
    }
  </style>
</head>
<body style="margin:0; padding:0; background-color:#0A0714; font-family:'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">

  <!-- Wrapper -->
  <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" 
         class="email-body-outer"
         style="background-color:#0A0714;">
    <tr>
      <td align="center" style="padding: 0;">

        <!-- Container -->
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="600" 
               class="email-container"
               style="max-width:600px; width:100%;">

          <!-- ═══ HEADER ═══ -->
          <tr>
            <td align="center" style="padding: 48px 24px 20px;">
              <!-- Logo row -->
              <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td align="center" style="padding-bottom: 12px;">
                    <span style="font-size:32px; line-height:1;">📡</span>
                  </td>
                </tr>
                <tr>
                  <td align="center">
                    <h1 style="margin:0; font-family:'Outfit','Noto Sans KR',-apple-system,sans-serif; font-size:28px; font-weight:700; color:#F5F3FF; letter-spacing:-0.02em;">
                      Pri<span style="color:#C084FC;">Signal</span>
                    </h1>
                  </td>
                </tr>
                <tr>
                  <td align="center" style="padding-top: 8px;">
                    <p style="margin:0; font-family:'Inter','Noto Sans KR',-apple-system,sans-serif; font-size:13px; color:#6D5BA3; line-height:1.5; letter-spacing:0.02em;">
                      노이즈 속에서 시그널을 포착하다
                    </p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Subject line -->
          <tr>
            <td align="center" style="padding: 0 24px 20px;">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0"
                     style="background-color:#1A1035; border:1px solid rgba(196,181,253,0.08); border-radius:12px;">
                <tr>
                  <td style="padding: 14px 28px;">
                    <p style="margin:0; font-family:'Noto Sans KR',-apple-system,sans-serif; font-size:14px; font-weight:600; color:#E9D5FF; text-align:center;">
                      {{ subject }}
                    </p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Gradient divider -->
          <tr>
            <td style="padding: 0 32px;">
              <div style="height:1px; background: linear-gradient(90deg, transparent, rgba(124,58,237,0.3), rgba(192,132,252,0.2), transparent);"></div>
            </td>
          </tr>

          <!-- ═══ BODY ═══ -->
          <tr>
            <td style="padding: 28px 24px;">
              <!-- Content Container (glassmorphism card) -->
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%"
                     bgcolor="#1A1035"
                     style="background-color: #1A1035; border: 1px solid rgba(196,181,253,0.08); border-radius: 16px;">
                <tr>
                  <td style="padding: 28px 24px; font-size:14px; color:#E9D5FF; line-height:1.75;">
                    <!-- Buttondown renders the markdown body here -->
                    {{ body }}
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- ═══ CTA: Daily Portal ═══ -->
          <tr>
            <td style="padding: 0 24px 12px;">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%"
                     bgcolor="#1A1035"
                     style="background-color: rgba(124,58,237,0.08); border: 1px solid rgba(124,58,237,0.15); border-radius: 16px;">
                <tr>
                  <td align="center" style="padding: 24px;">
                    <p style="margin:0 0 16px; font-family:'Noto Sans KR',-apple-system,sans-serif; font-size:14px; color:#A78BFA;">
                      📡 오늘의 전체 시그널을 확인하세요
                    </p>
                    <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td align="center" bgcolor="#7C3AED"
                            style="background: linear-gradient(135deg, #7C3AED, #A855F7, #C084FC); border-radius: 100px; padding: 13px 36px;">
                          <a href="https://www.prisincera.com/prisignal#daily" 
                             style="font-family:'Outfit','Noto Sans KR',-apple-system,sans-serif; font-size:14px; font-weight:600; color:#FFFFFF; text-decoration:none; display:inline-block;">
                            데일리 포털에서 확인하기 →
                          </a>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- ═══ Web View CTA ═══ -->
          <tr>
            <td align="center" style="padding: 12px 24px 24px;">
              <a href="{{ email_url }}" 
                 style="font-family:'Inter','Noto Sans KR',-apple-system,sans-serif; font-size:12px; color:#6D5BA3; text-decoration:underline; text-decoration-color:rgba(109,91,163,0.3);">
                🌐 웹 브라우저에서 보기
              </a>
            </td>
          </tr>

          <!-- Gradient divider -->
          <tr>
            <td style="padding: 0 32px;">
              <div style="height:1px; background: linear-gradient(90deg, transparent, rgba(196,181,253,0.1), transparent);"></div>
            </td>
          </tr>

          <!-- ═══ FOOTER ═══ -->
          <tr>
            <td style="padding: 32px 24px 16px;">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                <!-- Visit Site -->
                <tr>
                  <td align="center" style="padding-bottom: 12px;">
                    <a href="https://www.prisincera.com" 
                       style="font-family:'Outfit','Noto Sans KR',-apple-system,sans-serif; font-size:13px; color:#A78BFA; text-decoration:none;">
                      ✦ prisincera.com
                    </a>
                  </td>
                </tr>
                <!-- Tagline -->
                <tr>
                  <td align="center" style="padding-bottom: 16px;">
                    <p style="margin:0; font-size:12px; color:#6D5BA3; line-height:1.6;">
                      20년차 PO의 기준으로 설계된 AI 큐레이션 뉴스레터
                    </p>
                  </td>
                </tr>
                <!-- Unsubscribe -->
                <tr>
                  <td align="center">
                    <p style="margin:0; font-size:11px; color:#4A3D6E;">
                      더 이상 받고 싶지 않으시면
                      <a href="{{ unsubscribe_url }}" 
                         style="color:#6D5BA3; text-decoration:underline;">구독을 해지</a>할 수 있습니다.
                    </p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- ═══ Brand Footer ═══ -->
          <tr>
            <td align="center" style="padding: 8px 24px 40px;">
              <p style="margin:0; font-family:'Outfit','Noto Sans KR',-apple-system,sans-serif; font-size:11px; color:#4A3D6E; letter-spacing:0.05em;">
                © 2026 PriSincera · Sincerity, Prioritized.
              </p>
            </td>
          </tr>

        </table>
        <!-- /Container -->

      </td>
    </tr>
  </table>
  <!-- /Wrapper -->

</body>
</html>
