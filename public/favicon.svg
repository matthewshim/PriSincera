<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Background gradient (dark space) -->
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0E0E1A"/>
      <stop offset="100%" stop-color="#020205"/>
    </radialGradient>
    <!-- Up triangle gradient (Pri — aspiration) -->
    <linearGradient id="fav-up" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#C7D2FE" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#A5B4FC" stop-opacity="0.3"/>
    </linearGradient>
    <!-- Down triangle gradient (Sincera — grounding) -->
    <linearGradient id="fav-down" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#A5B4FC" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#070710" stop-opacity="0.2"/>
    </linearGradient>
    <!-- Amber accent -->
    <linearGradient id="fav-amber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E5B25D" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#F7D070" stop-opacity="0.7"/>
    </linearGradient>
    <!-- Orbit gradient -->
    <linearGradient id="fav-orbit" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E5B25D" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#C7D2FE" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#C7D2FE" stop-opacity="0.85"/>
    </linearGradient>
    <!-- Core glow -->
    <radialGradient id="fav-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#A5B4FC" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#A5B4FC" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Orbit circle -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#fav-orbit)" stroke-width="6"
          stroke-dasharray="1330 44" stroke-linecap="round"/>

  <!-- Down triangle (behind) — pointing down -->
  <path d="M256 450 L68 118 L444 118 Z" fill="url(#fav-down)" stroke="#C7D2FE" stroke-width="1.5" stroke-opacity="0.3" stroke-linejoin="round"/>

  <!-- Up triangle — pointing up -->
  <path d="M256 62 L444 394 L68 394 Z" fill="url(#fav-up)" stroke="#C7D2FE" stroke-width="1.5" stroke-opacity="0.3" stroke-linejoin="round"/>

  <!-- Amber accent triangle -->
  <path d="M350 310 L444 394 L374 394 Z" fill="url(#fav-amber)" opacity="0.8"/>

  <!-- Core glow -->
  <circle cx="256" cy="256" r="40" fill="url(#fav-glow)"/>

  <!-- Core dot -->
  <circle cx="256" cy="256" r="14" fill="#FFFFFF" opacity="0.95"/>
</svg>
