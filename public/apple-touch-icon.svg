<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1035"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
    <linearGradient id="fav-up" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#C4B5FD" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="fav-down" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4C1D95" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="fav-amber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="fav-orbit" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#67E8F9" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#22D3EE" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#A5F3FC" stop-opacity="0.6"/>
    </linearGradient>
    <radialGradient id="fav-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#C4B5FD" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded rect background for Apple Touch -->
  <rect width="180" height="180" rx="36" fill="url(#bg)"/>

  <!-- Orbit circle -->
  <circle cx="90" cy="90" r="74" fill="none" stroke="url(#fav-orbit)" stroke-width="2.5"
          stroke-dasharray="448 15" stroke-linecap="round"/>

  <!-- Down triangle -->
  <path d="M90 157 L24 40 L156 40 Z" fill="url(#fav-down)" stroke="#C4B5FD" stroke-width="0.8" stroke-opacity="0.3" stroke-linejoin="round"/>

  <!-- Up triangle -->
  <path d="M90 23 L156 140 L24 140 Z" fill="url(#fav-up)" stroke="#C4B5FD" stroke-width="0.8" stroke-opacity="0.3" stroke-linejoin="round"/>

  <!-- Amber accent -->
  <path d="M123 108 L156 140 L131 140 Z" fill="url(#fav-amber)" opacity="0.8"/>

  <!-- Core glow -->
  <circle cx="90" cy="90" r="14" fill="url(#fav-glow)"/>

  <!-- Core dot -->
  <circle cx="90" cy="90" r="5" fill="#FFFFFF" opacity="0.95"/>
</svg>
