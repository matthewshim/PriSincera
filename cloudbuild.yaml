steps:
  # Step 0: Security audit — fail build on high/critical vulnerabilities
  - name: 'node:20-alpine'
    entrypoint: 'sh'
    args:
      - '-c'
      - 'npm ci && npm audit --audit-level=high'

  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'VITE_FIREBASE_API_KEY=AIzaSyCu21j7PvDB1j-FBFj9rl3dMrDPvk_Z_pQ'
      - '-t'
      - 'asia-northeast3-docker.pkg.dev/$PROJECT_ID/prisincera-images/web:$SHORT_SHA'
      - '-t'
      - 'asia-northeast3-docker.pkg.dev/$PROJECT_ID/prisincera-images/web:latest'
      - '.'

  # Step 2: Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'asia-northeast3-docker.pkg.dev/$PROJECT_ID/prisincera-images/web'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'prisincera-web'
      - '--image'
      - 'asia-northeast3-docker.pkg.dev/$PROJECT_ID/prisincera-images/web:$SHORT_SHA'
      - '--region'
      - 'asia-northeast3'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '5'
      - '--concurrency'
      - '80'

images:
  - 'asia-northeast3-docker.pkg.dev/$PROJECT_ID/prisincera-images/web:$SHORT_SHA'
  - 'asia-northeast3-docker.pkg.dev/$PROJECT_ID/prisincera-images/web:latest'

options:
  logging: CLOUD_LOGGING_ONLY
